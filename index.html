<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
		    width: 100%;
		    height: 100%;
		    padding: 0;
		    margin: 0;
		}
		#map-title {
		    position: absolute;
		    top: 16px;
		    left: 54px;
		    z-index: 1000;
		    background: rgba(255, 255, 255, 0.92);
		    padding: 10px 14px;
		    border-radius: 6px;
		    font-family: Arial, sans-serif;
		    font-size: 20px;
		    font-weight: bold;
		    box-shadow: 0 1px 5px rgba(0,0,0,0.25);
		}
		#map-subtitle {
		    font-size: 12px;
		    font-weight: normal;
		    margin-top: 4px;
		}
		.leaflet-popup-content table {
		    font-family: Arial, sans-serif;
		    font-size: 13px;
		}
		.leaflet-popup-content th {
		    text-align: left;
		    padding-right: 8px;
		    color: #555;
		}
        </style>
        <title>Kollektiver in Denmark</title>
    </head>
    <body>
		<div id="map-title">
	        Kollektiver in Denmark
	        <div id="map-subtitle">Interactive map for the Communal Studies Conference, July 2026</div>
	    </div>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/kollektiv_conf26_1.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[53.627673826852835,7.815540622853833],[57.984729699479836,13.790931533885148]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    var img = popup._contentNode.querySelector('td img');
                    if (img) {
                        // If already loaded (cache), update immediately
                        if (img.complete && img.naturalHeight > 0) {
                            popup.update();
                        } else {
                            img.addEventListener('load', function() {
                                popup.update();
                            });
                            img.addEventListener('error', function() {
                                popup.update();
                            });
                        }
                    }
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleTerrain_0');
        map.getPane('pane_GoogleTerrain_0').style.zIndex = 400;
        var layer_GoogleTerrain_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleTerrain_0',
            opacity: 0.5,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18
        });
        layer_GoogleTerrain_0;
        map.addLayer(layer_GoogleTerrain_0);
        function pop_kollektiv_conf26_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
			            <td class="visible-with-data" id="kollektiv_name" colspan="2"><strong>' + (feature.properties['kollektiv_name'] !== null ? autolinker.link(String(feature.properties['kollektiv_name']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
			        </tr>\
			        <tr>\
			            <th scope="row">Address</th>\
			            <td class="visible-with-data" id="address">' + (feature.properties['address'] !== null ? autolinker.link(String(feature.properties['address']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
			        </tr>\
			        <tr>\
			            <th scope="row">Established</th>\
			            <td class="visible-with-data" id="est_yr">' + (feature.properties['est_yr'] !== null ? autolinker.link(String(feature.properties['est_yr']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
			        </tr>\
			        <tr>\
			            <th scope="row">Home type</th>\
			            <td class="visible-with-data" id="home_type">' + (feature.properties['home_type'] !== null ? autolinker.link(String(feature.properties['home_type']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
			        </tr>\
			        <tr>\
			            <th scope="row">Residents</th>\
			            <td class="visible-with-data" id="resident_num">' + (feature.properties['resident_num'] !== null ? autolinker.link(String(feature.properties['resident_num']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
			        </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_kollektiv_conf26_1_0() {
            return {
                pane: 'pane_kollektiv_conf26_1',
                radius: 3.5,
                opacity: 1,
                color: 'rgba(108,77,195,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(231,154,30,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_kollektiv_conf26_1');
        map.getPane('pane_kollektiv_conf26_1').style.zIndex = 401;
        map.getPane('pane_kollektiv_conf26_1').style['mix-blend-mode'] = 'normal';
        var layer_kollektiv_conf26_1 = new L.geoJson(json_kollektiv_conf26_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_kollektiv_conf26_1',
            layerName: 'layer_kollektiv_conf26_1',
            pane: 'pane_kollektiv_conf26_1',
            onEachFeature: pop_kollektiv_conf26_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_kollektiv_conf26_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_kollektiv_conf26_1);
        map.addLayer(layer_kollektiv_conf26_1);
        setBounds();
        </script>        
    </body>
</html>
